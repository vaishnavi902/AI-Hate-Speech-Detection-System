<!DOCTYPE html>
<html>
<head>
    <title>Hate Speech Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">AI Hate Speech Detection</h2>

    <div class="card p-4 shadow">
        <textarea id="text" class="form-control mb-3" rows="4" placeholder="Enter text"></textarea>

        <button class="btn btn-primary" onclick="sendText()">Check</button>
        <button class="btn btn-secondary ms-2" onclick="loadHistory()">History</button>

        <h4 class="mt-3" id="result"></h4>
    </div>

    <div class="card mt-4 p-3 shadow">
        <h4>History</h4>
        <ul id="history" class="list-group"></ul>
    </div>

    <div class="card mt-4 p-3 shadow">
        <h4>Analytics</h4>
        <canvas id="chart"></canvas>
    </div>

    <div class="card mt-4 p-3 shadow">
    <h4>Chatbot</h4>
    </div>
    
    <div id="chatbox" style="height:200px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>
    <input type="text" id="msg" class="form-control mt-2" placeholder="Ask something...">
    <button class="btn btn-success mt-2" onclick="sendMessage()">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
async function sendText() {
    let text = document.getElementById("text").value;

    let response = await fetch("http://127.0.0.1:5000/predict-text", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text })
    });

    let data = await response.json();
    document.getElementById("result").innerText = data.result;
}

async function loadHistory() {
    let response = await fetch("http://127.0.0.1:5000/history");
    let data = await response.json();

    let list = document.getElementById("history");
    list.innerHTML = "";

    let hate = 0, not_hate = 0;

    data.forEach(item => {
        let li = document.createElement("li");
        li.className = "list-group-item";
        li.innerText = item.text + " → " + item.result;
        list.appendChild(li);

        if (item.result === "Hate Speech Detected") {            hate++;
        } else {
            not_hate++;
        }
    });

    let myChart = null;

function drawChart(hate, not_hate) {
    const ctx = document.getElementById('chart').getContext('2d');

    // ✅ Destroy old chart
    if (myChart !== null) {
        myChart.destroy();
    }

    // ✅ Create new chart
    myChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Hate Speech', 'Not Hate Speech'],
            datasets: [{
                data: [hate, not_hate],
                backgroundColor: ['skyblue', 'pink'] // optional for clarity
            }]
        },
        options: {
            responsive: true
        }
    });
}

    drawChart(hate, not_hate);
}

async function sendMessage() {
    let msg = document.getElementById("msg").value;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += "<div><b>You:</b> " + msg + "</div>";

    let response = await fetch("http://127.0.0.1:5000/chatbot", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: msg })
    });

    let data = await response.json();

    chatbox.innerHTML += "<div><b>Bot:</b> " + data.reply + "</div>";

    document.getElementById("msg").value = "";
}
</script>

</body>
</html>
